function bytes(b64){
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}
async function unlock(password){
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:bytes(PAYLOAD.salt), iterations:PAYLOAD.iterations, hash:'SHA-256'},
    keyMaterial,
    {name:'AES-GCM', length:256},
    false,
    ['decrypt']
  );
  const encrypted = bytes(PAYLOAD.data);
  const tag = bytes(PAYLOAD.tag);
  const combined = new Uint8Array(encrypted.length + tag.length);
  combined.set(encrypted, 0);
  combined.set(tag, encrypted.length);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:bytes(PAYLOAD.iv), tagLength:128}, key, combined);
  return new TextDecoder().decode(plain);
}
document.getElementById('gate').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  msg.textContent = '正在解密...';
  try {
    const html = await unlock(document.getElementById('password').value);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    msg.textContent = '口令错误或页面数据已损坏。';
    btn.disabled = false;
  }
});
